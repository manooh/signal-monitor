services:
  signal-monitor-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: signal-monitor-api:local
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5050:8080"

  tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    profiles:
      - test
